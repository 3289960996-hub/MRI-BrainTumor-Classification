name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML pytest

      - name: Compile source files
        run: python -m py_compile config.py dataset.py model.py train.py predict.py utils.py

      - name: Run tests
        run: pytest -q
